<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSI-ENN BESS — Map Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav"></nav>

  <main class="container container-narrow">
    <div class="hero-left">
      <h1>Map Explorer</h1>
      <p class="hero-intro">Explore the spatial distribution of BESS investment opportunities across the Italian distribution grid. Each dot represents a scored substation — colour-coded by suitability band, investment return, or portfolio priority. Click any substation for its full valuation profile.</p>
    </div>

    <!-- Filters -->
    <div class="filter-section" id="filters">
      <div class="filter-group">
        <label for="region-filter">Region</label>
        <select id="region-filter">
          <option value="">All Regions</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="color-mode">Color By</label>
        <select id="color-mode">
          <option value="band">SSI Band</option>
          <option value="irr">IRR</option>
          <option value="npv">NPV</option>
          <option value="priority">Investment Priority</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="voltage-filter">Voltage Range (kV)</label>
        <input type="range" id="voltage-filter" min="0" max="400" value="400">
        <span id="voltage-value">All</span>
      </div>

      <div class="filter-group">
        <label for="irr-filter">Min IRR (%)</label>
        <input type="range" id="irr-filter" min="0" max="50" value="0" step="1">
        <span id="irr-value">0%</span>
      </div>

      <div class="filter-group">
        <label>Bands</label>
        <div class="checkbox-group" id="band-filters">
          <!-- Populated by JavaScript -->
        </div>
      </div>

      <div class="filter-group" style="display: flex; flex-direction: column; justify-content: flex-end;">
        <button class="btn btn-secondary" id="reset-filters">Reset Filters</button>
      </div>
    </div>

    <!-- Map Container -->
    <div class="map-container">
      <canvas id="italy-map"></canvas>
      <div class="map-legend" id="map-legend">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </main>

  <footer class="footer"></footer>

  <script src="bess-engine.js?v=4"></script>
  <script src="nav.js"></script>
  <script>
    // Map state
    const mapState = {
      colorMode: 'band',
      selectedRegion: '',
      selectedBands: { Low: true, Medium: true, High: true, Critical: true },
      minVoltage: 0,
      maxVoltage: 400,
      minIRR: 0,
      filteredSubstations: []
    };

    // Italy simplified polygon (roughly 40 points for coastline)
    const italyPolygon = [
      [12.6, 47.1], [13.5, 47.2], [14.2, 47.0], [15.2, 46.9], [15.8, 46.5],
      [16.5, 46.2], [17.5, 45.8], [17.8, 45.3], [18.5, 44.5], [18.0, 44.0],
      [17.5, 43.8], [16.8, 43.5], [16.0, 43.8], [15.5, 43.5], [14.8, 43.8],
      [14.0, 44.2], [13.2, 44.1], [12.5, 44.3], [12.0, 44.8], [11.5, 45.0],
      [11.0, 45.2], [10.5, 45.5], [10.2, 46.0], [9.8, 46.5], [9.5, 47.0],
      [10.0, 47.1], [10.5, 47.2], [11.0, 47.1], [12.0, 47.2], [12.6, 47.1]
    ];

    async function initMap() {
      const loaded = await engine.loadData('data.json');
      if (!loaded) {
        document.querySelector('main').innerHTML = '<div class="container"><p style="color: red;">Error loading data</p></div>';
        return;
      }

      populateFilters();
      applyFilters();
      drawMap();
      attachCanvasListeners();
      setupEventListeners();
    }

    function populateFilters() {
      // Regions
      const regionFilter = document.getElementById('region-filter');
      engine.getAllRegions().forEach(region => {
        const option = document.createElement('option');
        option.value = region;
        option.textContent = region;
        regionFilter.appendChild(option);
      });

      // Band checkboxes
      const bandFilters = document.getElementById('band-filters');
      engine.getBands().forEach(band => {
        const label = document.createElement('label');
        label.className = 'checkbox-item';
        label.innerHTML = `
          <input type="checkbox" class="band-checkbox" value="${band}" checked>
          <span>${band}</span>
        `;
        bandFilters.appendChild(label);
      });
    }

    function setupEventListeners() {
      document.getElementById('region-filter').addEventListener('change', (e) => {
        mapState.selectedRegion = e.target.value;
        applyFilters();
      });

      document.getElementById('color-mode').addEventListener('change', (e) => {
        mapState.colorMode = e.target.value;
        drawMap();
      });

      document.getElementById('voltage-filter').addEventListener('change', (e) => {
        mapState.maxVoltage = Number(e.target.value);
        document.getElementById('voltage-value').textContent = e.target.value + ' kV';
        applyFilters();
      });

      document.getElementById('irr-filter').addEventListener('change', (e) => {
        mapState.minIRR = Number(e.target.value);
        document.getElementById('irr-value').textContent = e.target.value + '%';
        applyFilters();
      });

      document.querySelectorAll('.band-checkbox').forEach(cb => {
        cb.addEventListener('change', (e) => {
          mapState.selectedBands[e.target.value] = e.target.checked;
          applyFilters();
        });
      });

      document.getElementById('reset-filters').addEventListener('click', () => {
        document.getElementById('region-filter').value = '';
        document.getElementById('color-mode').value = 'band';
        document.getElementById('voltage-filter').value = '400';
        document.getElementById('irr-filter').value = '0';
        document.querySelectorAll('.band-checkbox').forEach(cb => cb.checked = true);
        mapState.selectedRegion = '';
        mapState.colorMode = 'band';
        mapState.maxVoltage = 400;
        mapState.minIRR = 0;
        mapState.selectedBands = { Low: true, Medium: true, High: true, Critical: true };
        document.getElementById('voltage-value').textContent = 'All';
        document.getElementById('irr-value').textContent = '0%';
        applyFilters();
      });
    }

    function applyFilters() {
      let filtered = engine.substations;

      if (mapState.selectedRegion) {
        filtered = filtered.filter(s => s.region === mapState.selectedRegion);
      }

      filtered = filtered.filter(s => mapState.selectedBands[s.classification]);
      filtered = filtered.filter(s => (s.voltage_kv || 0) <= mapState.maxVoltage);
      filtered = filtered.filter(s => (s.bess?.config_B?.IRR_pct || 0) >= mapState.minIRR);

      mapState.filteredSubstations = filtered;
      drawMap();
    }

    function drawMap() {
      const canvas = document.getElementById('italy-map');
      const ctx = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;

      // Map bounds
      const lat_min = 36.5, lat_max = 47.1, lon_min = 6.6, lon_max = 18.5;

      // Transform functions
      const lonToX = lon => ((lon - lon_min) / (lon_max - lon_min)) * canvas.width;
      const latToY = lat => ((lat_max - lat) / (lat_max - lat_min)) * canvas.height;

      // Clear
      ctx.fillStyle = '#faf6f5';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw Italy outline
      ctx.strokeStyle = 'rgba(44,36,32,0.2)';
      ctx.fillStyle = '#f0ebe8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      italyPolygon.forEach((point, i) => {
        const x = lonToX(point[0]);
        const y = latToY(point[1]);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Draw substations
      const subs = mapState.filteredSubstations;
      const npvStats = engine.computeStats(subs, 'bess.config_B.NPV_M');
      const irrStats = engine.computeStats(subs, 'bess.config_B.IRR_pct');

      subs.forEach(sub => {
        const x = lonToX(sub.lon);
        const y = latToY(sub.lat);

        // Size by NPV
        const npvVal = sub.bess?.config_B?.NPV_M || 0;
        const npvRange = (npvStats?.max || 1) - (npvStats?.min || 0) || 1;
        const npvNorm = (npvVal - (npvStats?.min || 0)) / npvRange;
        const radius = 3 + (npvNorm * 7);

        // Color by mode
        let color;
        if (mapState.colorMode === 'band') {
          color = engine.getBandColor(sub.classification);
        } else if (mapState.colorMode === 'irr') {
          const irr = sub.bess?.config_B?.IRR_pct || 0;
          if (irr < 10) color = '#5d8563';
          else if (irr < 13) color = '#b8863a';
          else if (irr < 16) color = '#aa4234';
          else color = '#941914';
        } else if (mapState.colorMode === 'npv') {
          const npv = sub.bess?.config_B?.NPV_M || 0;
          if (npv < 0.3) color = '#5d8563';
          else if (npv < 0.8) color = '#b8863a';
          else if (npv < 2.0) color = '#aa4234';
          else color = '#941914';
        } else if (mapState.colorMode === 'priority') {
          const priority = sub.bess?.investment_priority || 1;
          if (priority <= 2) color = '#5d8563';
          else if (priority <= 3) color = '#b8863a';
          else if (priority <= 4) color = '#aa4234';
          else color = '#941914';
        }

        // Draw dot
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();

        // Hover tooltip
        sub._mapX = x;
        sub._mapY = y;
        sub._mapRadius = radius;
      });

      // Update legend
      updateLegend();
    }

    // Set up canvas event listeners ONCE (outside drawMap)
    let canvasListenersAttached = false;
    function attachCanvasListeners() {
      if (canvasListenersAttached) return;
      const canvas = document.getElementById('italy-map');
      if (!canvas) return;
      canvas.addEventListener('mousemove', (e) => {
        handleMapMouseMove(e, canvas, mapState.filteredSubstations);
      });
      canvas.addEventListener('click', (e) => {
        handleMapClick(e, canvas, mapState.filteredSubstations);
      });
      canvasListenersAttached = true;
    }

    function handleMapMouseMove(e, canvas, subs) {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      canvas.style.cursor = 'default';

      // Remove existing tooltip
      document.querySelectorAll('.map-tooltip').forEach(t => t.remove());

      // Find closest substation within hit radius
      let closest = null;
      let closestDist = Infinity;
      subs.forEach(sub => {
        if (sub._mapX === undefined) return;
        const dx = x - sub._mapX;
        const dy = y - sub._mapY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < sub._mapRadius + 8 && dist < closestDist) {
          closestDist = dist;
          closest = sub;
        }
      });

      if (closest) {
        canvas.style.cursor = 'pointer';
        const tooltip = document.createElement('div');
        tooltip.className = 'map-tooltip';
        tooltip.textContent = closest.name;
        tooltip.style.cssText = `
          position: absolute;
          background: rgba(44,36,32,0.9);
          color: white;
          padding: 6px 12px;
          border-radius: 4px;
          font-size: 12px;
          z-index: 15;
          pointer-events: none;
          white-space: nowrap;
          left: ${rect.left + x + 10}px;
          top: ${rect.top + y + 10}px;
        `;
        document.body.appendChild(tooltip);
      }
    }

    function handleMapClick(e, canvas, subs) {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // Find the single closest substation within hit radius
      let closest = null;
      let closestDist = Infinity;

      subs.forEach(sub => {
        if (sub._mapX === undefined) return;
        const dx = x - sub._mapX;
        const dy = y - sub._mapY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < sub._mapRadius + 8 && dist < closestDist) {
          closestDist = dist;
          closest = sub;
        }
      });

      if (closest) {
        showSubstationPopup(closest, e.pageX, e.pageY);
      }
    }

    function showSubstationPopup(sub, pageX, pageY) {
      // Remove existing popup and its outside-click handler
      closeActivePopup();

      const popup = document.createElement('div');
      popup.className = 'map-popup';

      // Position popup, keeping it within viewport
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      let left = pageX + 15;
      let top = pageY + 15;
      // Adjust if it would go off-screen (estimate 320px wide, 450px tall)
      if (left + 330 > viewW) left = pageX - 335;
      if (top + 460 > window.scrollY + viewH) top = pageY - 460;
      if (left < 5) left = 5;
      if (top < window.scrollY + 5) top = window.scrollY + 5;

      popup.style.cssText = `
        left: ${left}px;
        top: ${top}px;
      `;

      const html = `
        <button class="map-popup-close">×</button>
        <div class="map-popup-title">${sub.name}</div>
        <div class="map-popup-field">
          <span class="map-popup-label">Province:</span>
          <span class="map-popup-value">${sub.province}</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">Region:</span>
          <span class="map-popup-value">${sub.region}</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">Voltage:</span>
          <span class="map-popup-value">${sub.voltage_kv} kV</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">R Median:</span>
          <span class="map-popup-value">${engine.formatNumber(sub.R_median, 3)}</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">Classification:</span>
          <span class="map-popup-value"><span class="band-chip band-${(sub.classification||'medium').toLowerCase()}">${sub.classification}</span></span>
        </div>
        <div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--card-border); font-weight: 600; font-size: 0.8rem; color: var(--warm-grey); text-transform: uppercase;">Config A (4.9 MW / 19.6 MWh)</div>
        <div class="map-popup-field">
          <span class="map-popup-label">V_DNO:</span>
          <span class="map-popup-value">€${engine.formatNumber(sub.bess?.config_A?.V_DNO_M || 0, 2)}M</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">NPV:</span>
          <span class="map-popup-value">€${engine.formatNumber(sub.bess?.config_A?.NPV_M || 0, 2)}M</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">IRR:</span>
          <span class="map-popup-value">${engine.formatNumber(sub.bess?.config_A?.IRR_pct || 0, 1)}%</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">Payback:</span>
          <span class="map-popup-value">${engine.formatYears(sub.bess?.config_A?.Payback_yr || 0)}</span>
        </div>
        <div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--card-border); font-weight: 600; font-size: 0.8rem; color: var(--warm-grey); text-transform: uppercase;">Config B (9.9 MW / 39.6 MWh)</div>
        <div class="map-popup-field">
          <span class="map-popup-label">V_DNO:</span>
          <span class="map-popup-value">€${engine.formatNumber(sub.bess?.config_B?.V_DNO_M || 0, 2)}M</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">NPV:</span>
          <span class="map-popup-value">€${engine.formatNumber(sub.bess?.config_B?.NPV_M || 0, 2)}M</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">IRR:</span>
          <span class="map-popup-value">${engine.formatNumber(sub.bess?.config_B?.IRR_pct || 0, 1)}%</span>
        </div>
        <div class="map-popup-field">
          <span class="map-popup-label">Payback:</span>
          <span class="map-popup-value">${engine.formatYears(sub.bess?.config_B?.Payback_yr || 0)}</span>
        </div>
        <div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--card-border); font-size: 0.8rem; color: var(--warm-grey); font-style: italic;">
          ${sub.bess?.recommendation || 'Recommendation pending detailed analysis.'}
        </div>
      `;

      popup.innerHTML = html;
      document.body.appendChild(popup);

      popup.querySelector('.map-popup-close').addEventListener('click', (e) => {
        e.stopPropagation();
        closeActivePopup();
      });

      // Delay adding outside-click handler so the current click event doesn't trigger it
      if (activePopupTimerId) clearTimeout(activePopupTimerId);
      activePopupTimerId = setTimeout(() => {
        activePopupTimerId = null;
        activePopupCloseHandler = (e) => {
          if (!popup.contains(e.target)) {
            closeActivePopup();
          }
        };
        document.addEventListener('click', activePopupCloseHandler);
      }, 50);
    }

    // Track active popup so we can clean up properly
    let activePopupCloseHandler = null;
    let activePopupTimerId = null;
    function closeActivePopup() {
      document.querySelectorAll('.map-popup').forEach(p => p.remove());
      if (activePopupTimerId) {
        clearTimeout(activePopupTimerId);
        activePopupTimerId = null;
      }
      if (activePopupCloseHandler) {
        document.removeEventListener('click', activePopupCloseHandler);
        activePopupCloseHandler = null;
      }
    }

    function updateLegend() {
      const legend = document.getElementById('map-legend');
      let html = '<div style="font-weight: 600; margin-bottom: 0.8rem; font-size: 0.9rem;">Legend</div>';

      if (mapState.colorMode === 'band') {
        html += `
          <div class="legend-item"><div class="legend-dot" style="background-color: #5d8563;"></div> <span>Low</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #b8863a;"></div> <span>Medium</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #aa4234;"></div> <span>High</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #941914;"></div> <span>Critical</span></div>
        `;
      } else if (mapState.colorMode === 'irr') {
        html += `
          <div class="legend-item"><div class="legend-dot" style="background-color: #5d8563;"></div> <span>&lt;5%</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #b8863a;"></div> <span>5-10%</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #aa4234;"></div> <span>10-15%</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #941914;"></div> <span>&gt;15%</span></div>
        `;
      } else if (mapState.colorMode === 'npv') {
        html += `
          <div class="legend-item"><div class="legend-dot" style="background-color: #5d8563;"></div> <span>&lt;€500k</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #b8863a;"></div> <span>€500k-1.5M</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #aa4234;"></div> <span>€1.5M-3M</span></div>
          <div class="legend-item"><div class="legend-dot" style="background-color: #941914;"></div> <span>&gt;€3M</span></div>
        `;
      }

      html += '<div style="margin-top: 0.8rem; font-size: 0.75rem; color: var(--warm-grey-light);">Dot size: NPV magnitude</div>';
      legend.innerHTML = html;
    }

    initMap();
  </script>
</body>
</html>
